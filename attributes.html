<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute</title>
</head>
<body>
   <p style="color: saddlebrown" contenteditable = "True"> Hello Everyone! HOW ARE YOU DOING? </p>
</body>
</html>

<!-- Attributes are you for adding more information to the element. In the above code,
 we have added two attributes to the p tag. The first one is style, which is used to add CSS properties to the element. 
 The second one is contenteditable,
 which allows the user to edit the content of the element directly in the browser. -->
