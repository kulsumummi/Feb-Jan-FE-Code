<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- case 1 -->
    <p>This is a paragraph.</p> 
    <p>This is another paragraph.</p>
    <!-- case 2 -->
    <p>This is a paragraph.</p><p>This is the second line.</p>
    <!-- case 3 -->
    <p>This is a paragraph.This is the second line.</p>
    <!-- case 4 -->
    <!-- br is a line break element. It is used to display the output in new line -->
    <p>This is a paragraph.</p>
    <br>
    <p>This is the second line.</p>
    <!-- case 5 -->
     <!-- pre is a preformatted text element. It is used to display the output in new line and also it preserves the spaces. --> -->
    <pre>This is a paragraph.
This is the second line.</pre>

</body>
</html>
